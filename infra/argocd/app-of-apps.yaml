apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: resume-app-of-apps
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/129duckflew/resume-builder.git
    targetRevision: main
    path: infra/argocd/applications
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
