services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume-backend
    environment:
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: 5432
      DB_NAME: resume_db
      DB_USER: resume
      DB_PASS: resume123
    ports:
      - "8081:8080"
    volumes:
      - ./backend/src/main/resources/themes:/app/themes

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resume-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:80"]
      interval: 5s
      timeout: 3s
      retries: 10

  e2e:
    build:
      context: ./frontend/e2e
      dockerfile: Dockerfile
    container_name: resume-e2e
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_healthy
    environment:
      BASE_URL: http://frontend:80


