version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: resume-postgres
    environment:
      POSTGRES_DB: resume_db
      POSTGRES_USER: resume
      POSTGRES_PASSWORD: resume123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resume -d resume_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resume-backend
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: resume_db
      DB_USER: resume
      DB_PASS: resume123
    ports:
      - "8080:8080"
    volumes:
      - ./backend/src/main/resources/themes:/app/themes

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resume-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"

volumes:
  postgres_data:
