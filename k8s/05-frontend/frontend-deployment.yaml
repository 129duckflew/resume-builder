apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume-frontend
  namespace: resume-builder
  labels:
    app: resume-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: resume-frontend
  template:
    metadata:
      labels:
        app: resume-frontend
    spec:
      containers:
        - name: frontend
          image: localhost:5000/resume-builder-frontend:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          livenessProbe:
            exec:
              command:
                - wget
                - -qO-
                - http://127.0.0.1:80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - wget
                - -qO-
                - http://127.0.0.1:80
            initialDelaySeconds: 5
            periodSeconds: 5
