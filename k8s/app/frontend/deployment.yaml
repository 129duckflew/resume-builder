apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume-frontend
  namespace: resume-builder
  labels:
    app: resume-frontend
spec:
  # 不写 replicas：由 KEDA (HTTPScaledObject) 管理副本数，
  # 避免 ArgoCD 与 KEDA 互相拉扯导致启动中的 Pod 被杀。
  selector:
    matchLabels:
      app: resume-frontend
  template:
    metadata:
      labels:
        app: resume-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: frontend
          image: ghcr.io/129duckflew/resume-builder/frontend:cf02b73932b25da7f673d911aa960f5e4be3c575
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
          livenessProbe:
            exec:
              command:
                - wget
                - -qO-
                - http://127.0.0.1:80
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - wget
                - -qO-
                - http://127.0.0.1:80
            initialDelaySeconds: 5
            periodSeconds: 5
