apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume-backend
  namespace: resume-builder
  labels:
    app: resume-backend
spec:
  # 不写 replicas：由 KEDA (HTTPScaledObject) 管理副本数，
  # 避免 ArgoCD 与 KEDA 互相拉扯导致启动中的 Pod 被杀。
  selector:
    matchLabels:
      app: resume-backend
  template:
    metadata:
      labels:
        app: resume-backend
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "resume-builder"
        vault.hashicorp.com/agent-inject-secret-db-creds: "secret/data/resume-builder"
        vault.hashicorp.com/agent-inject-template-db-creds: |
          {{- with secret "secret/data/resume-builder" -}}
          export DB_USER="{{ .Data.data.DB_USER }}"
          export DB_PASS="{{ .Data.data.DB_PASS }}"
          export JWT_SECRET="{{ .Data.data.JWT_SECRET }}"
          {{- end }}
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: backend
          image: ghcr.io/129duckflew/resume-builder/backend:a7591c11fc7996f79474012760d5bbfe55234caa
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              . /vault/secrets/db-creds
              exec java -jar app.jar
          envFrom:
            - configMapRef:
                name: app-config
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          # Spring Boot 冷启动约需 100-120s（受限 CPU 下）。
          # startupProbe 成功前，liveness/readiness 均不生效，避免启动期被误杀。
          startupProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 10
            failureThreshold: 30 # 最长容忍 300s 启动时间
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            periodSeconds: 5
