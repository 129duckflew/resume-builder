apiVersion: apps/v1
kind: Deployment
metadata:
  name: resume-backend
  namespace: resume-builder
  labels:
    app: resume-backend
spec:
  replicas: 0
  selector:
    matchLabels:
      app: resume-backend
  template:
    metadata:
      labels:
        app: resume-backend
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: "resume-builder"
        vault.hashicorp.com/agent-inject-secret-db-creds: "secret/data/resume-builder"
        vault.hashicorp.com/agent-inject-template-db-creds: |
          {{- with secret "secret/data/resume-builder" -}}
          export DB_USER="{{ .Data.data.DB_USER }}"
          export DB_PASS="{{ .Data.data.DB_PASS }}"
          export JWT_SECRET="{{ .Data.data.JWT_SECRET }}"
          {{- end }}
    spec:
      containers:
        - name: backend
          image: ghcr.io/129duckflew/resume-builder/backend:latest
          imagePullPolicy: IfNotPresent
          command: ["sh", "-c"]
          args:
            - |
              source /vault/secrets/db-creds
              exec java -jar app.jar
          envFrom:
            - configMapRef:
                name: app-config
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 5
