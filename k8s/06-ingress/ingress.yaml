apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: resume-ingress
  namespace: keda
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`resume.local`)
      services:
        - name: keda-add-ons-http-interceptor-proxy
          port: 8080
---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: grafana-ingress
  namespace: resume-builder
spec:
  entryPoints:
    - web
  routes:
    - kind: Rule
      match: Host(`grafana.resume.local`)
      services:
        - name: grafana-service
          port: 3000
