server:
  port: 8080

spring:
  ai:
    mcp:
      server:
        name: resume-mcp-server
        version: 1.0.0
        type: SYNC
        stdio: true
        sse-message-endpoint: /mcp/message
        sse-endpoint: /mcp/sse
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:resume_db}
    username: ${DB_USER:resume}
    password: ${DB_PASS:resume123}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  jackson:
    serialization:
      write-dates-as-timestamps: false

app:
  themes:
    path: classpath:themes/
  export:
    chrome-path: /usr/bin/chromium
    pdf:
      timeout: 30000
  jwt:
    secret: ${JWT_SECRET:resume-builder-secret-for-dev-only-change-in-prod}
    expiration-ms: 86400000
  mcp:
    api-key: ${MCP_API_KEY:}
