name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin
          cache: maven

      - name: Run Maven tests
        run: cd backend && mvn --batch-mode test

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run unit tests
        run: cd frontend && npm test

      - name: Build (type-check + production build)
        run: cd frontend && npm run build

  e2e:
    name: E2E (Docker)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: resume_db
          POSTGRES_USER: resume
          POSTGRES_PASSWORD: resume123
        ports:
          - 5432:5432
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start services (backend, frontend)
        run: docker compose up --build -d backend frontend
        env:
          DB_HOST: postgres

      - name: Wait for frontend (port 3000)
        run: |
          for i in $(seq 1 30); do
            curl -s -o /dev/null -w '%{http_code}' http://localhost:3000 | grep -q 200 && echo "Frontend ready" && break
            echo "Waiting for frontend... ($i/30)"
            sleep 2
          done

      - name: Wait for backend (port 8081)
        run: |
          for i in $(seq 1 30); do
            curl -s -o /dev/null -w '%{http_code}' http://localhost:8081/api/themes | grep -q 200 && echo "Backend ready" && break
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done

      - name: Run Playwright E2E tests
        run: docker compose run --build --rm e2e

      - name: Cleanup
        if: always()
        run: docker compose down

  validate-k8s-manifests:
    name: Validate K8s Manifests
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    steps:
      - uses: actions/checkout@v4
      - name: Create target namespace for dry-run
        run: kubectl create namespace resume-builder --dry-run=client -o yaml | kubectl apply -f -
      - name: Validate K8s manifests
        run: |
          for f in $(find k8s -name '*.yaml' | sort); do
            kubectl apply --dry-run=client -f "$f" || exit 1
          done
