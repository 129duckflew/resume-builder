name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  backend-test:
    name: Backend Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: 25
          distribution: temurin
          cache: maven

      - name: Run Maven tests
        run: cd backend && mvn --batch-mode test

  frontend-test:
    name: Frontend Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Run unit tests
        run: cd frontend && npm test

      - name: Build (type-check + production build)
        run: cd frontend && npm run build

  e2e:
    name: E2E (Docker)
    runs-on: ubuntu-latest
    needs: [backend-test, frontend-test]
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build and start services (backend, frontend)
        run: docker compose up --build -d backend frontend

      - name: Wait for frontend (port 3000)
        run: |
          for i in $(seq 1 30); do
            curl -s -o /dev/null -w '%{http_code}' http://localhost:3000 | grep -q 200 && echo "Frontend ready" && break
            echo "Waiting for frontend... ($i/30)"
            sleep 2
          done

      - name: Wait for backend (port 8081)
        run: |
          for i in $(seq 1 30); do
            curl -s -o /dev/null -w '%{http_code}' http://localhost:8081/api/themes | grep -q 200 && echo "Backend ready" && break
            echo "Waiting for backend... ($i/30)"
            sleep 2
          done

      - name: Run Playwright E2E tests
        run: docker compose run --build --rm e2e

      - name: Cleanup
        if: always()
        run: docker compose down

  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: [e2e]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    permissions:
      contents: write
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_PAT }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          provenance: false
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}/backend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/backend:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/backend:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/backend:buildcache,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          provenance: false
          platforms: linux/amd64,linux/arm64
          tags: |
            ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}
            ghcr.io/${{ github.repository }}/frontend:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/frontend:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/frontend:buildcache,mode=max

      - name: Update image tags in manifests
        run: |
          sed -i "s|image: ghcr.io/.*/resume-builder/backend:.*|image: ghcr.io/${{ github.repository }}/backend:${{ github.sha }}|" \
            k8s/app/backend/deployment.yaml
          sed -i "s|image: ghcr.io/.*/resume-builder/frontend:.*|image: ghcr.io/${{ github.repository }}/frontend:${{ github.sha }}|" \
            k8s/app/frontend/deployment.yaml

      - name: Commit & push updated manifests
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: update image tags to ${{ github.sha }}"
          file_pattern: k8s/app/
